version: '3.9'

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prodigitalix-api
    restart: unless-stopped
    env_file: ./backend/.env.production
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - prodigitalix
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Frontend Next.js ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prodigitalix-web
    restart: unless-stopped
    env_file: ./frontend/.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - prodigitalix
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Nginx Reverse Proxy + SSL ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: prodigitalix-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - prodigitalix

  # ── Certbot SSL auto-renewal ─────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: prodigitalix-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'

  # ── Watchtower — déploiement auto ───────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: prodigitalix-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 300
    networks:
      - prodigitalix

volumes:
  certbot_www:
  certbot_conf:

networks:
  prodigitalix:
    driver: bridge
