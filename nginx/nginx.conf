user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;
  gzip on;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1000;
  client_max_body_size 20M;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # Security headers
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
  server {
    listen 80;
    server_name prodigitalix.com www.prodigitalix.com api.prodigitalix.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # ── Frontend (app principale) ───────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name prodigitalix.com www.prodigitalix.com;

    ssl_certificate     /etc/letsencrypt/live/prodigitalix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prodigitalix.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Service worker + manifest
    location ~* \.(webmanifest|manifest\.json)$ {
      proxy_pass http://frontend:3000;
      add_header Cache-Control "public, max-age=86400";
      add_header Content-Type "application/manifest+json";
    }

    # Assets statiques Next.js
    location /_next/static/ {
      proxy_pass http://frontend:3000;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.svg {
      proxy_pass http://frontend:3000;
      add_header Cache-Control "public, max-age=86400";
    }

    # Page maintenance (activer si besoin)
    # location / { return 503; }
    # error_page 503 /maintenance.html;
    # location = /maintenance.html { root /etc/nginx/html; internal; }

    location / {
      proxy_pass         http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 90;
    }
  }

  # ── API Backend ─────────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.prodigitalix.com;

    ssl_certificate     /etc/letsencrypt/live/prodigitalix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prodigitalix.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Auth routes — rate limit strict
    location /api/v1/auth/ {
      limit_req zone=auth burst=3 nodelay;
      proxy_pass http://backend:4000;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Host $host;
    }

    # Webhook Chariow — pas de rate limit
    location /api/v1/subscription/webhook/ {
      proxy_pass http://backend:4000;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://backend:4000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60;
    }
  }
}
